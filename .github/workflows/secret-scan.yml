name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Fleet-private string guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan diff for fleet-private strings
        run: |
          set -u

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Handle initial-push edge cases (zero SHA, missing parent)
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse "${HEAD}^" 2>/dev/null || echo "$HEAD")"
          fi

          PATTERN='kensai\.cloud|kensai-cloud|HV-FS0|SMYT-SERVER|CPA-SRV'

          HITS=$(git diff "$BASE" "$HEAD" \
            -- ':(exclude).github/workflows/secret-scan.yml' \
            | grep -E '^\+[^+]' \
            | grep -nE "$PATTERN" || true)

          if [ -n "$HITS" ]; then
            echo "::error::Fleet-private strings detected in changes:"
            echo "$HITS"
            echo ""
            echo "Patterns guarded: kensai.cloud, kensai-cloud, HV-FS0, SMYT-SERVER, CPA-SRV"
            echo "These are deployment-specific and must not appear in this public repo."
            exit 1
          fi

          echo "Clean: no fleet-private strings in changes."
