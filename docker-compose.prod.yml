# ops-brain — Production deployment on kensai.cloud
# Uses shared-postgres from shared-services stack
# Caddy handles routing (no labels needed — add Caddyfile entry)

services:
  ops-brain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops-brain
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m
    environment:
      - DATABASE_URL=postgresql://ops_brain:${OPS_BRAIN_DB_PASSWORD}@shared-postgres:5432/ops_brain
      - OPS_BRAIN_TRANSPORT=http
      - OPS_BRAIN_LISTEN=0.0.0.0:3000
      - OPS_BRAIN_AUTH_TOKEN=${OPS_BRAIN_AUTH_TOKEN}
      - OPS_BRAIN_MIGRATE=true
      - RUST_LOG=ops_brain=info
    networks:
      - traefik-net
      - shared-db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik-net:
    external: true
  shared-db:
    external: true
